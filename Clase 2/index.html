<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clase JavaScript</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Interacción con JavaScript</h1>

    <!-- INPUT -->
    <input type="text" id="nombreInput" placeholder="Escribe tu nombre">

    <!-- BOTÓN -->
    <button id="saludarBtn">Saludar</button>

    <!-- RESULTADO -->
    <p id="resultado">Aquí aparecerá el mensaje</p>

    <!-- CONTADOR -->
    <h2>Contador</h2>
    <button id="sumarBtn">+</button>
    <button id="restarBtn">-</button>
    <p id="contador">0</p>

    <script src="app.js"></script>
</body>
</html>
